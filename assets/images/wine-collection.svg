<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep wine atmosphere gradients -->
    <radialGradient id="wineAtmos" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3A0A14"/>
      <stop offset="50%" stop-color="#1A0508"/>
      <stop offset="100%" stop-color="#0A0305"/>
    </radialGradient>
    <linearGradient id="wineGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8B2635" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#6B1A2A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0305" stop-opacity="0"/>
    </linearGradient>
    <!-- Bottle gradients -->
    <linearGradient id="bottleBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D0508"/>
      <stop offset="20%" stop-color="#1C0810"/>
      <stop offset="50%" stop-color="#2A0C16"/>
      <stop offset="80%" stop-color="#1C0810"/>
      <stop offset="100%" stop-color="#0A0305"/>
    </linearGradient>
    <linearGradient id="bottleSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="45%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="neckGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D0508"/>
      <stop offset="40%" stop-color="#1C0810"/>
      <stop offset="60%" stop-color="#1C0810"/>
      <stop offset="100%" stop-color="#0D0508"/>
    </linearGradient>
    <!-- Label gradient -->
    <linearGradient id="labelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0810"/>
      <stop offset="100%" stop-color="#0D0508"/>
    </linearGradient>
    <!-- Gold gradients -->
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2C97E"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7A2E"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A7A2E"/>
      <stop offset="50%" stop-color="#E2C97E"/>
      <stop offset="100%" stop-color="#9A7A2E"/>
    </linearGradient>
    <!-- Wine pour/drip gradient -->
    <linearGradient id="winePour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B2635" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6B1A2A" stop-opacity="0"/>
    </linearGradient>
    <!-- Arabesque pattern -->
    <pattern id="arabesqueWine" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none"/>
      <circle cx="30" cy="30" r="14" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
      <circle cx="30" cy="30" r="8" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.15"/>
      <line x1="30" y1="0" x2="30" y2="60" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
      <line x1="0" y1="30" x2="60" y2="30" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
      <line x1="0" y1="0" x2="60" y2="60" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>
      <line x1="60" y1="0" x2="0" y2="60" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>
      <polygon points="30,16 34,27 46,27 36,34 40,45 30,38 20,45 24,34 14,27 26,27"
        fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wineBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BACKGROUND -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect width="900" height="1200" fill="#0A0305"/>
  <rect width="900" height="1200" fill="url(#wineAtmos)"/>
  <rect width="900" height="1200" fill="url(#wineGlow)"/>
  <!-- Arabesque BG pattern -->
  <rect width="900" height="1200" fill="url(#arabesqueWine)" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ATMOSPHERIC WINE GLOW BEHIND BOTTLE -->
  <!-- ═══════════════════════════════════════════════ -->
  <ellipse cx="450" cy="580" rx="220" ry="380" fill="#8B2635" opacity="0.12" filter="url(#wineBlur)"/>
  <ellipse cx="450" cy="400" rx="140" ry="200" fill="#C9A84C" opacity="0.04" filter="url(#wineBlur)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WINE POUR / ABSTRACT DRIP LEFT -->
  <!-- ═══════════════════════════════════════════════ -->
  <path d="M 340,150 Q 320,350 300,500 Q 285,620 295,700"
    fill="none" stroke="#8B2635" stroke-width="18" stroke-linecap="round" opacity="0.15"/>
  <path d="M 340,150 Q 320,350 300,500 Q 285,620 295,700"
    fill="none" stroke="#8B2635" stroke-width="8" stroke-linecap="round" opacity="0.2"/>

  <!-- Wine pour right -->
  <path d="M 560,200 Q 580,380 595,520 Q 610,640 600,740"
    fill="none" stroke="#6B1A2A" stroke-width="14" stroke-linecap="round" opacity="0.12"/>
  <path d="M 560,200 Q 580,380 595,520 Q 610,640 600,740"
    fill="none" stroke="#6B1A2A" stroke-width="6" stroke-linecap="round" opacity="0.18"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTLE SHADOW -->
  <!-- ═══════════════════════════════════════════════ -->
  <ellipse cx="450" cy="1090" rx="90" ry="18" fill="#000" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WINE BOTTLE — Main Body -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Capsule (foil top) -->
  <rect x="430" y="178" width="40" height="52" rx="4" fill="#1A0810"/>
  <rect x="428" y="194" width="44" height="6" fill="#C9A84C" opacity="0.6"/>
  <rect x="428" y="202" width="44" height="2" fill="#C9A84C" opacity="0.3"/>

  <!-- Cork/neck top -->
  <rect x="434" y="162" width="32" height="20" rx="3" fill="#2A1A0E"/>
  <rect x="436" y="164" width="28" height="16" rx="2" fill="#3A2218"/>

  <!-- Bottle neck — tapered -->
  <path d="M 422,228 L 430,480 L 470,480 L 478,228 Z" fill="url(#neckGrad)"/>
  <!-- Neck sheen -->
  <path d="M 437,228 L 442,480 L 446,480 L 441,228 Z" fill="#C9A84C" opacity="0.06"/>

  <!-- Shoulder curve -->
  <path d="M 380,480 Q 380,520 430,540 L 430,480 Z" fill="url(#bottleBody)"/>
  <path d="M 520,480 Q 520,520 470,540 L 470,480 Z" fill="url(#bottleBody)"/>

  <!-- Bottle body -->
  <rect x="380" y="520" width="140" height="540" rx="2" fill="url(#bottleBody)"/>
  <!-- Body sheen -->
  <rect x="380" y="520" width="140" height="540" rx="2" fill="url(#bottleSheen)"/>

  <!-- Bottom punt (indentation) -->
  <ellipse cx="450" cy="1060" rx="55" ry="12" fill="#0A0305" opacity="0.6"/>
  <path d="M 380,1060 L 382,1080 L 518,1080 L 520,1060 Z" fill="url(#bottleBody)"/>
  <ellipse cx="450" cy="1080" rx="70" ry="8" fill="url(#bottleBody)"/>

  <!-- Bottle edge highlights -->
  <line x1="380" y1="520" x2="382" y2="1060" stroke="#C9A84C" stroke-width="0.6" opacity="0.2"/>
  <line x1="520" y1="520" x2="518" y2="1060" stroke="#C9A84C" stroke-width="0.6" opacity="0.2"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTLE LABEL -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="393" y="580" width="114" height="200" rx="2" fill="url(#labelBg)"/>
  <rect x="393" y="580" width="114" height="200" rx="2" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <!-- Inner label border -->
  <rect x="399" y="586" width="102" height="188" rx="1" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

  <!-- Label top gold bar -->
  <rect x="393" y="580" width="114" height="18" rx="2" fill="#C9A84C" opacity="0.15"/>
  <rect x="393" y="580" width="114" height="1" fill="#C9A84C" opacity="0.7"/>

  <!-- Label central medallion -->
  <circle cx="450" cy="638" r="28" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <circle cx="450" cy="638" r="20" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
  <!-- 8-pointed star in medallion -->
  <polygon points="450,618 453,630 465,628 457,638 465,648 453,646 450,658 447,646 435,648 443,638 435,628 447,630"
    fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.6"/>
  <circle cx="450" cy="638" r="5" fill="#C9A84C" opacity="0.3"/>

  <!-- Label text lines (abstract) -->
  <rect x="415" y="672" width="70" height="1.5" fill="#C9A84C" opacity="0.5"/>
  <rect x="420" y="679" width="60" height="1" fill="#C9A84C" opacity="0.3"/>
  <rect x="425" y="690" width="50" height="1" fill="#C9A84C" opacity="0.2"/>
  <rect x="415" y="700" width="70" height="1.5" fill="#C9A84C" opacity="0.4"/>
  <rect x="425" y="710" width="50" height="1" fill="#C9A84C" opacity="0.25"/>
  <rect x="430" y="720" width="40" height="1" fill="#C9A84C" opacity="0.2"/>

  <!-- Label bottom gold bar -->
  <rect x="393" y="761" width="114" height="18" rx="2" fill="#C9A84C" opacity="0.1"/>
  <rect x="393" y="778" width="114" height="1" fill="#C9A84C" opacity="0.6"/>

  <!-- Secondary label below main label -->
  <rect x="405" y="800" width="90" height="50" rx="1" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
  <rect x="412" y="812" width="76" height="1" fill="#C9A84C" opacity="0.3"/>
  <rect x="415" y="820" width="70" height="1" fill="#C9A84C" opacity="0.2"/>
  <rect x="418" y="828" width="64" height="1" fill="#C9A84C" opacity="0.2"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DECORATIVE ARABESQUE FLANKING BOTTLE -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Left arabesque vine -->
  <g opacity="0.4" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <path d="M 340,400 Q 360,420 345,450 Q 330,480 350,510"/>
    <path d="M 345,450 Q 325,445 315,430"/>
    <path d="M 340,400 Q 320,395 310,380"/>
    <circle cx="314" cy="430" r="6"/>
    <circle cx="312" cy="379" r="8"/>
    <circle cx="349" cy="511" r="7"/>
    <!-- Leaf shapes -->
    <path d="M 314,430 Q 300,418 305,405 Q 318,410 314,430 Z" fill="#8B2635" opacity="0.3"/>
    <path d="M 312,379 Q 295,368 300,355 Q 315,362 312,379 Z" fill="#8B2635" opacity="0.3"/>
  </g>
  <g opacity="0.35" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <path d="M 340,560 Q 355,580 342,615 Q 328,645 345,670"/>
    <path d="M 342,615 Q 322,610 312,596"/>
    <path d="M 340,560 Q 320,554 310,540"/>
    <circle cx="313" cy="595" r="6"/>
    <circle cx="311" cy="540" r="8"/>
    <circle cx="344" cy="671" r="7"/>
    <path d="M 313,595 Q 298,583 303,570 Q 316,575 313,595 Z" fill="#8B2635" opacity="0.25"/>
  </g>

  <!-- Right arabesque vine -->
  <g opacity="0.4" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <path d="M 560,400 Q 540,420 555,450 Q 570,480 550,510"/>
    <path d="M 555,450 Q 575,445 585,430"/>
    <path d="M 560,400 Q 580,395 590,380"/>
    <circle cx="586" cy="430" r="6"/>
    <circle cx="588" cy="379" r="8"/>
    <circle cx="551" cy="511" r="7"/>
    <path d="M 586,430 Q 600,418 595,405 Q 582,410 586,430 Z" fill="#8B2635" opacity="0.3"/>
    <path d="M 588,379 Q 605,368 600,355 Q 585,362 588,379 Z" fill="#8B2635" opacity="0.3"/>
  </g>
  <g opacity="0.35" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <path d="M 560,560 Q 545,580 558,615 Q 572,645 555,670"/>
    <path d="M 558,615 Q 578,610 588,596"/>
    <path d="M 560,560 Q 580,554 590,540"/>
    <circle cx="587" cy="595" r="6"/>
    <circle cx="589" cy="540" r="8"/>
    <circle cx="556" cy="671" r="7"/>
    <path d="M 587,595 Q 602,583 597,570 Q 584,575 587,595 Z" fill="#8B2635" opacity="0.25"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DECORATIVE OUTER FRAME BORDER -->
  <!-- ═══════════════════════════════════════════════ -->
  <!-- Outer border lines -->
  <rect x="20" y="20" width="860" height="1160" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.35"/>
  <rect x="32" y="32" width="836" height="1136" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornaments -->
  <g fill="none" stroke="#C9A84C" opacity="0.5">
    <!-- Top-left -->
    <path d="M 20,60 L 20,20 L 60,20" stroke-width="1.5"/>
    <path d="M 32,70 L 32,32 L 70,32" stroke-width="0.7"/>
    <circle cx="20" cy="20" r="4" fill="#C9A84C" opacity="0.4"/>
    <!-- Top-right -->
    <path d="M 880,60 L 880,20 L 840,20" stroke-width="1.5"/>
    <path d="M 868,70 L 868,32 L 830,32" stroke-width="0.7"/>
    <circle cx="880" cy="20" r="4" fill="#C9A84C" opacity="0.4"/>
    <!-- Bottom-left -->
    <path d="M 20,1140 L 20,1180 L 60,1180" stroke-width="1.5"/>
    <path d="M 32,1130 L 32,1168 L 70,1168" stroke-width="0.7"/>
    <circle cx="20" cy="1180" r="4" fill="#C9A84C" opacity="0.4"/>
    <!-- Bottom-right -->
    <path d="M 880,1140 L 880,1180 L 840,1180" stroke-width="1.5"/>
    <path d="M 868,1130 L 868,1168 L 830,1168" stroke-width="0.7"/>
    <circle cx="880" cy="1180" r="4" fill="#C9A84C" opacity="0.4"/>
  </g>

  <!-- Horizontal mid-rule lines -->
  <line x1="20" y1="150" x2="340" y2="150" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
  <line x1="560" y1="150" x2="880" y2="150" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
  <line x1="20" y1="1060" x2="340" y2="1060" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
  <line x1="560" y1="1060" x2="880" y2="1060" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TOP CROWN ORNAMENT -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#goldGlow)" opacity="0.7">
    <!-- Crown arch motif -->
    <path d="M 350,80 Q 350,50 450,40 Q 550,50 550,80"
      fill="none" stroke="#C9A84C" stroke-width="1.2"/>
    <path d="M 370,80 Q 370,58 450,50 Q 530,58 530,80"
      fill="none" stroke="#C9A84C" stroke-width="0.6"/>
    <!-- Crown points -->
    <polygon points="450,35 453,45 460,40 456,50 450,45 444,50 440,40 447,45" fill="#C9A84C" opacity="0.5"/>
    <polygon points="380,60 383,70 390,65 386,75 380,70 374,75 370,65 377,70" fill="#C9A84C" opacity="0.3"/>
    <polygon points="520,60 523,70 530,65 526,75 520,70 514,75 510,65 517,70" fill="#C9A84C" opacity="0.3"/>
    <!-- Horizontal rule under crown -->
    <line x1="330" y1="85" x2="570" y2="85" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="340" y1="90" x2="560" y2="90" stroke="#C9A84C" stroke-width="0.4"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTOM TEXT AREA ORNAMENT -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="330" y1="1110" x2="570" y2="1110" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="1116" x2="560" y2="1116" stroke="#C9A84C" stroke-width="0.4" opacity="0.3"/>
  <!-- Bottom text lines (label area) -->
  <rect x="380" y="1125" width="140" height="1.5" fill="#C9A84C" opacity="0.4"/>
  <rect x="395" y="1132" width="110" height="1" fill="#C9A84C" opacity="0.25"/>
  <rect x="405" y="1140" width="90" height="1" fill="#C9A84C" opacity="0.2"/>
  <!-- Small bottom star -->
  <polygon points="450,1155 452,1161 458,1161 453,1165 455,1171 450,1167 445,1171 447,1165 442,1161 448,1161"
    fill="#C9A84C" opacity="0.35"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WINE DROPLET ACCENTS (floating) -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx="295" cy="680" r="4" fill="#8B2635" opacity="0.4"/>
  <circle cx="285" cy="710" r="3" fill="#8B2635" opacity="0.3"/>
  <circle cx="300" cy="730" r="5" fill="#6B1A2A" opacity="0.3"/>
  <circle cx="605" cy="680" r="4" fill="#8B2635" opacity="0.4"/>
  <circle cx="615" cy="710" r="3" fill="#8B2635" opacity="0.3"/>
  <circle cx="600" cy="730" r="5" fill="#6B1A2A" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SUBTLE VIGNETTE -->
  <!-- ═══════════════════════════════════════════════ -->
  <radialGradient id="vignetteWine" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#0A0305" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="900" height="1200" fill="url(#vignetteWine)"/>

</svg>
